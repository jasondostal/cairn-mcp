name: Build & Push

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install --quiet ruff bandit mypy pip-audit pydantic

      - name: Ruff (lint + format check)
        run: ruff check cairn/

      - name: Mypy (type check)
        run: mypy cairn/

      - name: Bandit (security — high severity)
        run: bandit -r cairn/ -lll -q

      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit -r requirements.lock --desc on

      - name: Hadolint (Dockerfile best practices)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

      - name: Hadolint (UI Dockerfile)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: cairn-ui/Dockerfile
          failure-threshold: error

      - name: ShellCheck
        run: shellcheck entrypoint.sh

      - name: Gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: ESLint (UI)
        working-directory: cairn-ui
        run: |
          npm ci --ignore-scripts
          npx eslint .

      - name: npm audit (UI dependency vulnerabilities)
        working-directory: cairn-ui
        run: |
          npm audit --omit=dev || true
          npm audit --audit-level=high

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: cairn
          POSTGRES_USER: cairn
          POSTGRES_PASSWORD: cairn-ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cairn"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install --extra-index-url https://download.pytorch.org/whl/cpu -e ".[dev,code]"

      - name: Run tests
        env:
          CAIRN_TEST_DB_HOST: localhost
          CAIRN_TEST_DB_PORT: "5432"
          CAIRN_TEST_DB_USER: cairn
          CAIRN_TEST_DB_PASS: cairn-ci
          CAIRN_TEST_DB_NAME: cairn
        run: pytest tests/ --tb=short -q

      - name: Check imports
        run: python -c "import cairn.server; import cairn.core.services; print('Imports OK')"

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Server image ---
      - name: Server metadata
        id: server-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=

      - name: Build and push server
        id: server-build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.server-meta.outputs.tags }}
          labels: ${{ steps.server-meta.outputs.labels }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Sign server image
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.server-build.outputs.digest }}
        run: cosign sign --yes "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"

      # --- UI image ---
      - name: UI metadata
        id: ui-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ui
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=

      - name: Build and push UI
        id: ui-build
        uses: docker/build-push-action@v6
        with:
          context: ./cairn-ui
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.ui-meta.outputs.tags }}
          labels: ${{ steps.ui-meta.outputs.labels }}
          cache-from: type=gha,scope=ui
          cache-to: type=gha,mode=max,scope=ui

      - name: Sign UI image
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.ui-build.outputs.digest }}
        run: cosign sign --yes "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ui@${DIGEST}"

      # --- SBOM generation + attestation ---
      - name: Generate SBOM (server)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.server-build.outputs.digest }}"
          format: spdx-json
          output: server-sbom.spdx.json
          scanners: ""

      - name: Attest SBOM (server)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.server-build.outputs.digest }}
        run: cosign attest --yes --type spdxjson --predicate server-sbom.spdx.json "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"

      - name: Generate SBOM (UI)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ui@${{ steps.ui-build.outputs.digest }}"
          format: spdx-json
          output: ui-sbom.spdx.json
          scanners: ""

      - name: Attest SBOM (UI)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.ui-build.outputs.digest }}
        run: cosign attest --yes --type spdxjson --predicate ui-sbom.spdx.json "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ui@${DIGEST}"

  scan:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      packages: read
      security-events: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy (server image)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main"
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
          scanners: vuln
          vuln-type: library

      - name: Trivy (UI image)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ui:main"
          format: table
          severity: CRITICAL
          exit-code: 1
          scanners: vuln
          vuln-type: library

  smoke:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start cairn stack
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${GITHUB_SHA:0:7}"
          docker network create cairn-net
          docker run -d \
            --name cairn-db \
            --network cairn-net \
            -e POSTGRES_DB=cairn \
            -e POSTGRES_USER=cairn \
            -e POSTGRES_PASSWORD=smoke-test \
            pgvector/pgvector:pg16
          # Wait for Postgres
          for i in $(seq 1 30); do
            if docker exec cairn-db pg_isready -U cairn > /dev/null 2>&1; then break; fi
            sleep 1
          done
          docker run -d \
            --name cairn-graph \
            --network cairn-net \
            -e NEO4J_AUTH=neo4j/smoke-test-neo4j \
            -e NEO4J_PLUGINS='["apoc"]' \
            neo4j:5-community
          # Wait for Neo4j
          for i in $(seq 1 30); do
            if docker exec cairn-graph cypher-shell -u neo4j -p smoke-test-neo4j "RETURN 1" > /dev/null 2>&1; then break; fi
            sleep 1
          done
          docker run -d \
            --name cairn \
            --network cairn-net \
            -e CAIRN_DB_HOST=cairn-db \
            -e CAIRN_DB_PORT=5432 \
            -e CAIRN_DB_NAME=cairn \
            -e CAIRN_DB_USER=cairn \
            -e CAIRN_DB_PASS=smoke-test \
            -e CAIRN_SECRET_KEY=smoke-test-secret-not-for-production \
            -e CAIRN_ALLOW_INSECURE=true \
            -e CAIRN_NEO4J_URI=bolt://cairn-graph:7687 \
            -e CAIRN_NEO4J_USER=neo4j \
            -e CAIRN_NEO4J_PASSWORD=smoke-test-neo4j \
            -e CAIRN_TRANSPORT=http \
            -e CAIRN_EMBEDDING_BACKEND=local \
            -p 8081:8000 \
            "$IMAGE"

      - name: Wait for API
        run: |
          for i in $(seq 1 90); do
            if curl -sf http://localhost:8081/api/status > /dev/null 2>&1; then
              echo "API ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "API did not become ready within 90s"
          docker logs cairn
          exit 1

      - name: Assert /api/status
        run: |
          RESP=$(curl -sf http://localhost:8081/api/status)
          echo "$RESP"
          echo "$RESP" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert 'version' in d, f'Missing version: {d}'
          print(f\"version {d['version']}: OK\")
          "

      - name: Assert MCP endpoint
        run: |
          RESP=$(curl -sS -X POST \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json, text/event-stream' \
            http://localhost:8081/mcp \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"smoke","version":"1.0"}}}' \
            --max-time 10)
          echo "$RESP"
          echo "$RESP" | python3 -c "
          import sys, json
          raw = sys.stdin.read().strip()
          # Handle SSE format (event: ...\ndata: {...}) or plain JSON
          for line in raw.splitlines():
              if line.startswith('data: '):
                  raw = line[6:]
                  break
          d = json.loads(raw)
          assert 'result' in d, f'Expected result in response: {d}'
          print('MCP initialize: OK')
          "

      - name: Assert MCP tool execution
        run: |
          # Extract session ID from initialize response
          INIT_RESP=$(curl -sS -X POST \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json, text/event-stream' \
            http://localhost:8081/mcp \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"smoke","version":"1.0"}}}' \
            --max-time 10 -D /tmp/mcp-headers)
          SESSION_ID=$(grep -i 'mcp-session-id' /tmp/mcp-headers | tr -d '\r' | awk '{print $2}')
          # Send initialized notification
          curl -sS -X POST \
            -H 'Content-Type: application/json' \
            -H "Mcp-Session-Id: $SESSION_ID" \
            http://localhost:8081/mcp \
            -d '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            --max-time 5 || true
          # Call an actual MCP tool — this catches wiring bugs like the __main__ split (ca-217)
          RESP=$(curl -sS -X POST \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json, text/event-stream' \
            -H "Mcp-Session-Id: $SESSION_ID" \
            http://localhost:8081/mcp \
            -d '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"status","arguments":{}}}' \
            --max-time 10)
          echo "$RESP"
          echo "$RESP" | python3 -c "
          import sys, json
          raw = sys.stdin.read().strip()
          for line in raw.splitlines():
              if line.startswith('data: '):
                  raw = line[6:]
                  break
          d = json.loads(raw)
          assert 'result' in d, f'Tool call failed: {d}'
          content = d['result'].get('content', [])
          text = content[0].get('text', '') if content else ''
          parsed = json.loads(text)
          assert 'error' not in parsed, f'Tool returned error: {parsed}'
          assert 'version' in parsed, f'Status missing version: {parsed}'
          print(f'MCP tool execution: OK (v{parsed[\"version\"]})')
          "

      - name: DAST — Nuclei baseline scan
        run: |
          docker run --rm --network cairn-net \
            -v ${{ github.workspace }}:/templates:ro \
            projectdiscovery/nuclei:latest \
            -u http://cairn:8000 \
            -severity critical,high \
            -type http \
            -stats -silent \
            -markdown-export /dev/null || true
          # Nuclei exit code 0 = no findings, non-zero = findings.
          # Run non-blocking for now (|| true) to establish baseline.
          # Remove || true once baseline is clean.

      - name: Dump logs on failure
        if: failure()
        run: |
          docker logs cairn
          docker logs cairn-db
          docker logs cairn-graph

      - name: Cleanup
        if: always()
        run: |
          docker rm -f cairn cairn-db cairn-graph || true
          docker network rm cairn-net || true
