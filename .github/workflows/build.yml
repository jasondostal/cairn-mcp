name: Build & Push

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install --quiet ruff bandit mypy pip-audit pydantic

      - name: Ruff (lint + format check)
        run: ruff check cairn/

      - name: Mypy (type check)
        run: mypy cairn/

      - name: Bandit (security — high severity)
        run: bandit -r cairn/ -lll -q

      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit -r requirements.lock --desc on

      - name: Hadolint (Dockerfile best practices)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

      - name: Hadolint (UI Dockerfile)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: cairn-ui/Dockerfile
          failure-threshold: warning

      - name: ShellCheck
        run: shellcheck entrypoint.sh

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: ESLint (UI)
        working-directory: cairn-ui
        run: |
          npm ci --ignore-scripts
          npx eslint .

      - name: npm audit (UI dependency vulnerabilities)
        working-directory: cairn-ui
        run: |
          npm audit --omit=dev || true
          npm audit --audit-level=high

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install --extra-index-url https://download.pytorch.org/whl/cpu -e ".[dev]"

      - name: Run tests
        run: pytest tests/ --tb=short -q

      - name: Check imports
        run: python -c "import cairn.server; import cairn.core.services; print('Imports OK')"

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Server image ---
      - name: Server metadata
        id: server-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=

      - name: Build and push server
        id: server-build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.server-meta.outputs.tags }}
          labels: ${{ steps.server-meta.outputs.labels }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Sign server image
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.server-build.outputs.digest }}
        run: cosign sign --yes "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"

      # --- UI image ---
      - name: UI metadata
        id: ui-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ui
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=

      - name: Build and push UI
        id: ui-build
        uses: docker/build-push-action@v6
        with:
          context: ./cairn-ui
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.ui-meta.outputs.tags }}
          labels: ${{ steps.ui-meta.outputs.labels }}
          cache-from: type=gha,scope=ui
          cache-to: type=gha,mode=max,scope=ui

      - name: Sign UI image
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.ui-build.outputs.digest }}
        run: cosign sign --yes "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ui@${DIGEST}"

  scan:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      packages: read
      security-events: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy (server image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main"
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Trivy (UI image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ui:main"
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

  smoke:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start cairn stack
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${GITHUB_SHA:0:7}"
          docker network create cairn-net
          docker run -d \
            --name cairn-db \
            --network cairn-net \
            -e POSTGRES_DB=cairn \
            -e POSTGRES_USER=cairn \
            -e POSTGRES_PASSWORD=smoke-test \
            pgvector/pgvector:pg16
          # Wait for Postgres
          for i in $(seq 1 30); do
            if docker exec cairn-db pg_isready -U cairn > /dev/null 2>&1; then break; fi
            sleep 1
          done
          docker run -d \
            --name cairn \
            --network cairn-net \
            -e CAIRN_DB_HOST=cairn-db \
            -e CAIRN_DB_PORT=5432 \
            -e CAIRN_DB_NAME=cairn \
            -e CAIRN_DB_USER=cairn \
            -e CAIRN_DB_PASS=smoke-test \
            -e CAIRN_TRANSPORT=http \
            -e CAIRN_EMBEDDING_BACKEND=local \
            -p 8081:8000 \
            "$IMAGE"

      - name: Wait for API
        run: |
          for i in $(seq 1 90); do
            if curl -sf http://localhost:8081/api/status > /dev/null 2>&1; then
              echo "API ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "API did not become ready within 90s"
          docker logs cairn
          exit 1

      - name: Assert /api/status
        run: |
          RESP=$(curl -sf http://localhost:8081/api/status)
          echo "$RESP"
          echo "$RESP" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert 'version' in d, f'Missing version: {d}'
          print(f\"version {d['version']}: OK\")
          "

      - name: Assert MCP endpoint
        run: |
          RESP=$(curl -sS -X POST \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json, text/event-stream' \
            http://localhost:8081/mcp \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"smoke","version":"1.0"}}}' \
            --max-time 10)
          echo "$RESP"
          echo "$RESP" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert 'result' in d, f'Expected result in response: {d}'
          print('MCP initialize: OK')
          "

      - name: Dump logs on failure
        if: failure()
        run: |
          docker logs cairn
          docker logs cairn-db

      - name: Cleanup
        if: always()
        run: |
          docker rm -f cairn cairn-db || true
          docker network rm cairn-net || true
